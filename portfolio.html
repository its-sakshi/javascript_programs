<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* LEFT STRIP */
.side-text {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 70px;
    background: linear-gradient(to bottom, #ff0055, #ff4d6d);
    display: flex;
    justify-content: center;
    align-items: center;
}

.side-text span {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: bold;
    letter-spacing: 5px;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 80px;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    background: linear-gradient(45deg, #ff0055, #ff7b00);
    -webkit-background-clip: text;
    color: transparent;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #aaa;
}

nav a:hover {
    color: #ff4d6d;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px 80px;
}

/* TEXT */
.hero-text h1 {
    font-size: 40px;
}

.hero-text span {
    font-family: 'Pacifico', cursive;
    color: #ff4d6d;
}

.hero-text h2 {
    font-size: 50px;
    color: #ff0055;
}

.hero-text p {
    color: #bbb;
    max-width: 400px;
    margin: 15px 0;
}

/* BUTTONS */
.btn {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.primary {
    background: linear-gradient(45deg, #ff0055, #ff7b00);
    color: white;
}

.secondary {
    background: transparent;
    border: 2px solid #ff4d6d;
    color: #ff4d6d;
}

/* IMAGE AREA */
.hero-img {
    position: relative;
}

.circle {
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, #ff0055, #8b0000);
    border-radius: 50%;
    position: absolute;
    top: -40px;
    left: -40px;
    z-index: -1;
    filter: blur(10px);
}

.hero-img img {
    width: 320px;
    border-radius: 20px;
}

/* PROJECTS */
.projects {
    padding: 60px 80px;
}

.projects h2 {
    text-align: center;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 50px;
}

input, textarea {
    width: 60%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}
</style>
</head>

<body>

<div class="side-text">
    <span>PORTFOLIO</span>
</div>

<!-- NAV -->
<nav>
    <div class="logo">Nova</div>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">

    <div class="hero-text">
        <h1>Hi, I'm <span>Sakshi</span></h1>
        <h2>Creative Designer</h2>

        <p>
            I design modern, interactive, and visually stunning digital experiences.
            Passionate about UI/UX and frontend development.
        </p>

        <button class="btn primary">Hire Me</button>
        <button class="btn secondary">Resume</button>
    </div>

    <div class="hero-img">
        <div class="circle"></div>
        <img src="https://img.freepik.com/premium-photo/girl-happy-portrait-user-profile-by-ai_1119669-10.jpg">
    </div>

</div>

<!-- PROJECTS -->
<div class="projects">
    <h2><i>My Work<i></h2>

    <div class="grid">
        <div class="card">
            <img src="https://colorlib.com/wp/wp-content/uploads/sites/2/jevelin-portfolio-website-template.jpg">
            <h3><i>Portfolio Website</i></h3>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/originals/cf/d0/0f/cfd00ff613363792d38fb666df03331e.png">
            <h3><i>UI Design App</i></h3>
        </div>

        <div class="card">
            <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400/7af752159893229.63a89d7b96086.png">
            <h3><i>E-commerce</i></h3>
        </div>
    </div>
</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Contact Me</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Message"></textarea><br>
    <button class="btn primary">Send</button>
</div>

</body>
</html>
