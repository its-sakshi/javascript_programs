<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
    body {
    margin: 0;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    
    /* FIXED */
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* changed from center */
    padding: 30px 10px;
    }

    .card {
        background: rgba(255, 255, 255, 0.95);
        width: 350px;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h1 {
        color: #ff4e88;
        margin-bottom: 10px;
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .cake {
        width: 100%;
        border-radius: 15px;
        transition: transform 0.3s ease;
    }

    .cake:hover {
        transform: scale(1.05);
    }

    .menu {
        text-align: left;
        margin: 15px 0;
        padding: 10px;
        background: #fff0f5;
        border-radius: 10px;
    }

    .menu h2 {
        margin-bottom: 5px;
        color: #333;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
    }

    ul {
        padding-left: 20px;
    }

    ul li {
        margin: 5px 0;
    }

    .buttons a {
        display: inline-block;
        margin: 10px 5px;
        padding: 10px 15px;
        border-radius: 25px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        transition: 0.3s;
    }

    .date-btn {
        background: linear-gradient(45deg, #36d1dc, #5b86e5);
    }

    .place-btn {
        background: linear-gradient(45deg, #ff758c, #ff7eb3);
    }

    .buttons a:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    footer {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
    }
</style>
</head>

<body>

<div class="card">
    <h1><i> 🎉 Birthday Party Invitation 🎂</i></h1>

    <img class="cake" src="https://i.pinimg.com/originals/39/fe/51/39fe516499b282445783ada65d899212.jpg" alt="Cake">

    <p><i>You're invited to celebrate a special day filled with fun & joy!</i></p>

    <div class="menu">
        <h2>🍽 Menu</h2>
        <ul><i>
            <li>🎂 Chocolate Cake</li>
            <li>🍕 Pizza</li>
            <li>🍔 Burgers</li>
            <li>🥤 Cold Drinks</li>
            <li>🍨 Ice Cream</li></i>
        </ul>
    </div>

    <div class="buttons">
        <a href="#" class="date-btn">📅 25 April 2026</a>
        <a href="https://maps.google.com" target="_blank" class="place-btn">📍 Party Location</a>
    </div>

    <footer>✨ Let's celebrate together! ✨</footer>
</div>

</body>
</html>
